<!-- Metadata, SEO tags, responsive settings, feed metadata, and CSS link. -->

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>
    {% if page.title %}
      {{ page.title }} | {{ site.title }}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>

  <meta name="description" content="{{ page.description | default: site.description }}">

  {% seo %}
  {% feed_meta %}
  

  <!-- Favicons: default to the pink closed shell. -->
<link
  id="favicon"
  rel="icon"
  type="image/png"
  href="/assets/icons/favicon-day.png?v=2"
>

<link
  rel="shortcut icon"
  type="image/png"
  href="/assets/icons/favicon-day.png?v=2"
>

<!--
  Time-based favicon swap.
  Daytime: pink closed shell.
  Nighttime: aqua open shell.
  Uses the visitor's local time.
-->
<script>
  (function () {
    const hour = new Date().getHours();
    const isNight = hour >= 20 || hour < 6;

    const iconPath = isNight
      ? "/assets/icons/favicon-night.png?v=2"
      : "/assets/icons/favicon-day.png?v=2";

    document
      .querySelectorAll('link[rel="icon"], link[rel="shortcut icon"]')
      .forEach(function (icon) {
        icon.href = iconPath;
      });
  })();
</script>

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

</head>
