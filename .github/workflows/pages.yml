# .github/workflows/pages.yml
# Build and deploy the Jekyll site to GitHub Pages.
#
# This is a small CI/CD pipeline:
# 1. Trigger when code is pushed to main.
# 2. Install Ruby and Jekyll dependencies.
# 3. Build the static site into the _site folder.
# 4. Upload the _site folder as a Pages artefact.
# 5. Deploy the artefact to GitHub Pages.

name: Deploy Jekyll site to Pages

on:
  push:
    branches:
      - main

  # Allows you to run the workflow manually from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Prevents two deployments fighting each other if you push twice quickly.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Set up GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build site with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4